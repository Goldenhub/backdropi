    <rect x="0" y="0" width="66" height="66" rx="14" fill="url(#front)" filter="url(#shadow)"/>
  </g>
  <g transform="translate(508, 280)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#1c1a1e" letter-spacing="-0.03em">backdropi</text>
    <text x="0" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8b8589" font-weight="450" letter-spacing="-0.01em">Screenshot to Mockup Editor</text>
